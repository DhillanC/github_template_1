name: Feature Request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the feature or improvement.
      placeholder: Add a project board guide for new repositories.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: New contributors do not know how to move work through the board.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the preferred approach.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this improvement?
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Define what must be true when this feature is complete.
      value: |
        Given [some context]
        When [certain action is taken]
        Then [the expected outcome is observed]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add related issues, references, screenshots, or assumptions.
    validations:
      required: false
